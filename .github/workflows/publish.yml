name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'src/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  packages: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if version changed
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists — skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New version ${VERSION} — will publish"
          fi

      - name: Set up Node.js
        if: steps.version.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        if: steps.version.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ORG_PAT }}

      - name: Create git tag
        if: steps.version.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

    outputs:
      published: ${{ steps.version.outputs.exists == 'false' }}
      version: ${{ steps.version.outputs.version }}

  notify-consumers:
    needs: publish
    if: needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - product-noteble
          - product-systemdox
          - product-puglieseweb
    steps:
      - name: Dispatch update event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ORG_PAT }}
          repository: puglieseweb-ltd/${{ matrix.repo }}
          event-type: dependency-update
          client-payload: '{"package": "@puglieseweb-ltd/shared-astro-ui", "version": "${{ needs.publish.outputs.version }}"}'
